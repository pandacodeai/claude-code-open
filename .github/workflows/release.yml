name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build backend
        run: npm run build

      - name: Build frontend
        run: |
          cd src/web/client
          npm install
          npm run build

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          echo "## What's Changed" > CHANGELOG_BODY.md
          echo "" >> CHANGELOG_BODY.md

          if [ -n "$PREV_TAG" ]; then
            git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s (%h)" --no-merges >> CHANGELOG_BODY.md
          else
            git log --pretty=format:"- %s (%h)" --no-merges -20 >> CHANGELOG_BODY.md
          fi

          echo "" >> CHANGELOG_BODY.md
          echo "" >> CHANGELOG_BODY.md
          echo "**Full Changelog**: https://github.com/kill136/axon/compare/${PREV_TAG}...${CURRENT_TAG}" >> CHANGELOG_BODY.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG_BODY.md
          draft: false
          prerelease: false
          generate_release_notes: true

  build-packages:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows x64
            artifact: axon-windows-x64
            shell: pwsh
          - os: ubuntu-latest
            label: Linux x64
            artifact: axon-linux-x64
            shell: bash
          - os: macos-13
            label: macOS x64 (Intel)
            artifact: axon-macos-x64
            shell: bash
          - os: macos-latest
            label: macOS arm64 (Apple Silicon)
            artifact: axon-macos-arm64
            shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      # Linux: install native build dependencies
      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Install all dependencies (for build)
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Build frontend
        run: |
          cd src/web/client
          npm install
          npm run build

      - name: Reinstall production-only dependencies
        run: |
          rm -rf node_modules
          npm ci --omit=dev
        shell: bash
        if: runner.os != 'Windows'

      - name: Reinstall production-only dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          Remove-Item -Recurse -Force node_modules
          npm ci --omit=dev
        shell: pwsh

      - name: Create package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          PKG_DIR="${{ matrix.artifact }}"
          TAR_NAME="${{ matrix.artifact }}-${VERSION}.tar.gz"

          mkdir -p "$PKG_DIR/src/web/client"

          # Copy compiled output
          cp -r dist "$PKG_DIR/"
          cp -r src/web/client/dist "$PKG_DIR/src/web/client/"

          # Copy production node_modules
          cp -r node_modules "$PKG_DIR/"

          # Remove unnecessary files to reduce size
          find "$PKG_DIR/node_modules" -type f \( -name "*.md" -o -name "*.txt" -o -name "CHANGELOG*" -o -name "HISTORY*" -o -name ".npmignore" -o -name ".eslintrc*" -o -name ".prettierrc*" \) -delete 2>/dev/null || true
          find "$PKG_DIR/node_modules" -type d \( -name "test" -o -name "tests" -o -name "__tests__" -o -name "example" -o -name "examples" -o -name "docs" -o -name ".github" \) -exec rm -rf {} + 2>/dev/null || true

          # Copy config and scripts
          cp package.json "$PKG_DIR/"
          cp start.sh "$PKG_DIR/"
          chmod +x "$PKG_DIR/start.sh"
          cp README.md "$PKG_DIR/"
          cp LICENSE "$PKG_DIR/"

          # Create tar.gz
          tar -czf "$TAR_NAME" "$PKG_DIR"

          SIZE_MB=$(du -m "$TAR_NAME" | cut -f1)
          echo "Created $TAR_NAME (${SIZE_MB} MB)"
          echo "ASSET_NAME=$TAR_NAME" >> $GITHUB_ENV

      - name: Create package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $pkgDir = "${{ matrix.artifact }}"
          $zipName = "${{ matrix.artifact }}-$version.zip"

          New-Item -ItemType Directory -Path $pkgDir -Force | Out-Null

          # Copy compiled output
          Copy-Item -Path "dist" -Destination "$pkgDir/dist" -Recurse
          New-Item -ItemType Directory -Path "$pkgDir/src/web/client" -Force | Out-Null
          Copy-Item -Path "src/web/client/dist" -Destination "$pkgDir/src/web/client/dist" -Recurse

          # Copy production node_modules
          Copy-Item -Path "node_modules" -Destination "$pkgDir/node_modules" -Recurse

          # Remove unnecessary files to reduce size
          Get-ChildItem -Path "$pkgDir/node_modules" -Recurse -Include "*.md","*.txt","CHANGELOG*","HISTORY*",".npmignore",".eslintrc*",".prettierrc*" -File | Remove-Item -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Path "$pkgDir/node_modules" -Recurse -Directory -Include "test","tests","__tests__","example","examples","docs",".github" | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

          # Copy config and scripts
          Copy-Item -Path "package.json" -Destination "$pkgDir/"
          Copy-Item -Path "start.bat" -Destination "$pkgDir/"
          Copy-Item -Path "create-shortcut.ps1" -Destination "$pkgDir/"
          Copy-Item -Path "README.md" -Destination "$pkgDir/"
          Copy-Item -Path "LICENSE" -Destination "$pkgDir/"

          Compress-Archive -Path $pkgDir -DestinationPath $zipName -Force

          $sizeMB = [math]::Round((Get-Item $zipName).Length / 1MB, 1)
          Write-Host "Created $zipName ($sizeMB MB)"
          "ASSET_NAME=$zipName" | Out-File -Append $env:GITHUB_ENV -Encoding utf8

      - name: Upload package to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET_NAME }}
          fail_on_unmatched_files: true
