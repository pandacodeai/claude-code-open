name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build backend
        run: npm run build

      - name: Build frontend
        run: |
          cd src/web/client
          npm install
          npm run build

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          echo "## What's Changed" > CHANGELOG_BODY.md
          echo "" >> CHANGELOG_BODY.md

          if [ -n "$PREV_TAG" ]; then
            git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s (%h)" --no-merges >> CHANGELOG_BODY.md
          else
            git log --pretty=format:"- %s (%h)" --no-merges -20 >> CHANGELOG_BODY.md
          fi

          echo "" >> CHANGELOG_BODY.md
          echo "" >> CHANGELOG_BODY.md
          echo "**Full Changelog**: https://github.com/kill136/claude-code-open/compare/${PREV_TAG}...${CURRENT_TAG}" >> CHANGELOG_BODY.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG_BODY.md
          draft: false
          prerelease: false
          generate_release_notes: true

  build-windows:
    name: Build Windows Precompiled Package
    runs-on: windows-latest
    needs: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Build frontend
        run: |
          cd src/web/client
          npm install
          npm run build

      - name: Create Windows package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $zipName = "claude-code-open-windows-x64-$version.zip"
          
          # Create package directory
          $pkgDir = "claude-code-open-windows-x64"
          New-Item -ItemType Directory -Path $pkgDir -Force | Out-Null
          
          # Copy essential files
          Copy-Item -Path "dist" -Destination "$pkgDir/dist" -Recurse
          Copy-Item -Path "src/web/client/dist" -Destination "$pkgDir/src/web/client/dist" -Recurse -Force
          Copy-Item -Path "node_modules" -Destination "$pkgDir/node_modules" -Recurse
          Copy-Item -Path "package.json" -Destination "$pkgDir/"
          Copy-Item -Path "install.bat" -Destination "$pkgDir/"
          Copy-Item -Path "install.ps1" -Destination "$pkgDir/"
          Copy-Item -Path "create-shortcut.ps1" -Destination "$pkgDir/"
          Copy-Item -Path "update-and-start.bat" -Destination "$pkgDir/"
          Copy-Item -Path "start.bat" -Destination "$pkgDir/"
          Copy-Item -Path "README.md" -Destination "$pkgDir/"
          Copy-Item -Path "README.zh-CN.md" -Destination "$pkgDir/"
          Copy-Item -Path "LICENSE" -Destination "$pkgDir/"
          
          # Create zip
          Compress-Archive -Path $pkgDir -DestinationPath $zipName -Force
          
          Write-Host "Created $zipName"
          Write-Host "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload Windows Package to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          fail_on_unmatched_files: true
