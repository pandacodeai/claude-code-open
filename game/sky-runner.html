<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Sky Runner - 天空跑酷</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
canvas { display: block; }

#ui {
  position: fixed; top: 0; left: 0; width: 100%; pointer-events: none; z-index: 10;
  display: flex; justify-content: space-between; padding: 20px 30px;
}
#score, #speed-display {
  color: #fff; font-size: 24px; text-shadow: 0 0 10px rgba(0,200,255,0.8);
}
#overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 20; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
}
#overlay.hidden { display: none; }
#overlay h1 {
  font-size: 60px; color: #00d4ff; text-shadow: 0 0 30px #00d4ff;
  margin-bottom: 10px; letter-spacing: 4px;
}
#overlay h2 {
  font-size: 28px; color: #ff6b6b; margin-bottom: 20px;
}
#overlay .subtitle {
  font-size: 18px; color: #aaa; margin-bottom: 30px;
}
#overlay .stats {
  font-size: 22px; color: #ffd700; margin-bottom: 20px;
}
#overlay .hint {
  font-size: 20px; color: #fff; animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}
#combo {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 40px; color: #ffd700; text-shadow: 0 0 20px #ffd700;
  pointer-events: none; z-index: 15; opacity: 0; transition: opacity 0.3s;
}
#mobile-controls {
  position: fixed; bottom: 30px; left: 0; width: 100%;
  display: none; justify-content: center; gap: 20px; z-index: 15;
}
#mobile-controls button {
  width: 80px; height: 80px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.1); color: #fff; font-size: 30px;
  pointer-events: all; touch-action: none;
}
@media (max-width: 768px) {
  #mobile-controls { display: flex; }
}
</style>
</head>
<body>

<div id="ui">
  <div id="score">★ 0</div>
  <div id="speed-display">速度: 1x</div>
</div>

<div id="overlay">
  <h1>SKY RUNNER</h1>
  <div class="subtitle">天空跑酷 - 在浮空平台上奔跑</div>
  <div class="hint">按 空格键 / 点击屏幕 开始</div>
  <div class="subtitle" style="margin-top:20px; font-size:14px; color:#666">
    ← → 或 A/D 移动 &nbsp;|&nbsp; 空格 跳跃
  </div>
</div>

<div id="combo"></div>

<div id="mobile-controls">
  <button id="btn-left">◀</button>
  <button id="btn-jump">▲</button>
  <button id="btn-right">▶</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ====== 游戏配置 ======
const CONFIG = {
  platformWidth: 4,
  platformLength: 12,
  platformGap: 0.3,
  laneCount: 3,
  laneWidth: 1.2,
  baseSpeed: 0.12,
  maxSpeed: 0.35,
  speedIncrement: 0.0001,
  gravity: -0.018,
  jumpForce: 0.28,
  ballRadius: 0.3,
  viewDistance: 80,
  spawnDistance: 60,
  despawnDistance: -20,
  starHeight: 1.2,
};

// ====== 全局状态 ======
let scene, camera, renderer, clock;
let ball, ballVelocityY = 0, isOnGround = true;
let platforms = [], obstacles = [], stars = [];
let score = 0, combo = 0, gameSpeed, gameState = 'menu';
let ballLane = 1, targetX = 0, ballX = 0;
let nextPlatformZ = 0;
let particlePool = [];

// ====== 初始化 ======
function init() {
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0a0a2e, 0.012);

  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 4, -6);
  camera.lookAt(0, 1, 10);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x0a0a2e);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  clock = new THREE.Clock();

  // 灯光
  const ambientLight = new THREE.AmbientLight(0x334466, 0.6);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(5, 15, 10);
  dirLight.castShadow = true;
  dirLight.shadow.camera.near = 0.1;
  dirLight.shadow.camera.far = 80;
  dirLight.shadow.camera.left = -15;
  dirLight.shadow.camera.right = 15;
  dirLight.shadow.camera.top = 40;
  dirLight.shadow.camera.bottom = -10;
  dirLight.shadow.mapSize.width = 1024;
  dirLight.shadow.mapSize.height = 1024;
  scene.add(dirLight);

  const pointLight = new THREE.PointLight(0x00d4ff, 1, 50);
  pointLight.position.set(0, 8, 20);
  scene.add(pointLight);

  // 星空背景
  createStarfield();

  // 球
  createBall();

  // 初始平台
  for (let i = 0; i < 10; i++) {
    spawnPlatform(i < 2); // 前两个平台没有障碍
  }

  // 粒子池
  for (let i = 0; i < 50; i++) {
    const geo = new THREE.SphereGeometry(0.06, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color: 0xffd700 });
    const p = new THREE.Mesh(geo, mat);
    p.visible = false;
    p.userData = { vx: 0, vy: 0, vz: 0, life: 0 };
    scene.add(p);
    particlePool.push(p);
  }

  // 事件
  window.addEventListener('resize', onResize);
  window.addEventListener('keydown', onKeyDown);
  window.addEventListener('keyup', onKeyUp);
  renderer.domElement.addEventListener('click', onTap);
  renderer.domElement.addEventListener('touchstart', onTap);

  // 移动端按钮
  setupMobileControls();

  animate();
}

function createStarfield() {
  const starGeo = new THREE.BufferGeometry();
  const positions = [];
  for (let i = 0; i < 2000; i++) {
    positions.push(
      (Math.random() - 0.5) * 200,
      Math.random() * 100 + 10,
      (Math.random() - 0.5) * 200
    );
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.3, transparent: true, opacity: 0.8 });
  scene.add(new THREE.Points(starGeo, starMat));
}

function createBall() {
  const geo = new THREE.SphereGeometry(CONFIG.ballRadius, 24, 24);
  const mat = new THREE.MeshPhongMaterial({
    color: 0x00d4ff,
    emissive: 0x003344,
    shininess: 100,
    specular: 0xffffff,
  });
  ball = new THREE.Mesh(geo, mat);
  ball.castShadow = true;
  ball.position.set(0, CONFIG.ballRadius + 0.5, 0);
  scene.add(ball);

  // 球的光晕
  const glowGeo = new THREE.SphereGeometry(CONFIG.ballRadius * 1.3, 16, 16);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0x00d4ff, transparent: true, opacity: 0.15
  });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  ball.add(glow);
}

// ====== 平台生成 ======
function spawnPlatform(safe = false) {
  const z = nextPlatformZ;
  const group = new THREE.Group();
  group.position.z = z;

  // 平台主体
  const geo = new THREE.BoxGeometry(CONFIG.platformWidth, 0.4, CONFIG.platformLength);
  const hue = (z * 0.01) % 1;
  const color = new THREE.Color().setHSL(hue * 0.15 + 0.55, 0.6, 0.25);
  const mat = new THREE.MeshPhongMaterial({
    color: color,
    emissive: color.clone().multiplyScalar(0.2),
    transparent: true,
    opacity: 0.9,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.receiveShadow = true;
  mesh.position.y = 0;
  group.add(mesh);

  // 平台边缘发光线
  const edgeGeo = new THREE.BoxGeometry(CONFIG.platformWidth + 0.05, 0.05, CONFIG.platformLength + 0.05);
  const edgeMat = new THREE.MeshBasicMaterial({
    color: 0x00d4ff, transparent: true, opacity: 0.4
  });
  const edge = new THREE.Mesh(edgeGeo, edgeMat);
  edge.position.y = 0.21;
  group.add(edge);

  // 障碍物和星星
  if (!safe) {
    const segmentCount = Math.floor(CONFIG.platformLength / 3);
    for (let s = 0; s < segmentCount; s++) {
      const segZ = -CONFIG.platformLength / 2 + 2 + s * 3;

      if (Math.random() < 0.4 + gameSpeed * 0.5) {
        spawnObstacle(group, segZ);
      }

      if (Math.random() < 0.5) {
        spawnStar(group, segZ);
      }
    }
  } else {
    // 安全平台也放几颗星星
    for (let s = 0; s < 3; s++) {
      const segZ = -CONFIG.platformLength / 2 + 2 + s * 3;
      if (Math.random() < 0.6) spawnStar(group, segZ);
    }
  }

  scene.add(group);
  platforms.push(group);
  nextPlatformZ += CONFIG.platformLength + CONFIG.platformGap;
}

function spawnObstacle(parent, z) {
  const lane = Math.floor(Math.random() * CONFIG.laneCount);
  const x = (lane - 1) * CONFIG.laneWidth;

  // 随机障碍类型
  const type = Math.random();
  let mesh;

  if (type < 0.5) {
    // 方块障碍
    const geo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
    const mat = new THREE.MeshPhongMaterial({
      color: 0xff3366, emissive: 0x330011, shininess: 80
    });
    mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, 0.6, z);
  } else if (type < 0.8) {
    // 三角锥
    const geo = new THREE.ConeGeometry(0.4, 1, 6);
    const mat = new THREE.MeshPhongMaterial({
      color: 0xff6600, emissive: 0x331100, shininess: 80
    });
    mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, 0.7, z);
  } else {
    // 双障碍 - 占两个道
    const lane2 = (lane + (Math.random() < 0.5 ? 1 : -1) + 3) % 3;
    const x2 = (lane2 - 1) * CONFIG.laneWidth;

    const geo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
    const mat = new THREE.MeshPhongMaterial({
      color: 0xff3366, emissive: 0x330011, shininess: 80
    });
    const m1 = new THREE.Mesh(geo, mat);
    m1.position.set(x, 0.6, z);
    m1.castShadow = true;
    m1.userData.isObstacle = true;
    parent.add(m1);
    obstacles.push(m1);

    mesh = new THREE.Mesh(geo.clone(), mat.clone());
    mesh.position.set(x2, 0.6, z);
  }

  mesh.castShadow = true;
  mesh.userData.isObstacle = true;
  parent.add(mesh);
  obstacles.push(mesh);
}

function spawnStar(parent, z) {
  const lane = Math.floor(Math.random() * CONFIG.laneCount);
  const x = (lane - 1) * CONFIG.laneWidth;

  const group = new THREE.Group();
  group.position.set(x, CONFIG.starHeight, z);

  // 八面体作为星星
  const geo = new THREE.OctahedronGeometry(0.2, 0);
  const mat = new THREE.MeshPhongMaterial({
    color: 0xffd700, emissive: 0x664400, shininess: 100
  });
  const mesh = new THREE.Mesh(geo, mat);
  group.add(mesh);

  // 星星光晕
  const glowGeo = new THREE.SphereGeometry(0.35, 8, 8);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0xffd700, transparent: true, opacity: 0.2
  });
  group.add(new THREE.Mesh(glowGeo, glowMat));

  group.userData.isStar = true;
  group.userData.collected = false;
  parent.add(group);
  stars.push(group);
}

// ====== 粒子效果 ======
function emitParticles(pos, color, count = 10) {
  let emitted = 0;
  for (const p of particlePool) {
    if (emitted >= count) break;
    if (p.visible) continue;

    p.position.copy(pos);
    p.material.color.set(color);
    p.visible = true;
    p.userData.vx = (Math.random() - 0.5) * 0.15;
    p.userData.vy = Math.random() * 0.15 + 0.05;
    p.userData.vz = (Math.random() - 0.5) * 0.15;
    p.userData.life = 1;
    emitted++;
  }
}

function updateParticles() {
  for (const p of particlePool) {
    if (!p.visible) continue;
    p.position.x += p.userData.vx;
    p.position.y += p.userData.vy;
    p.position.z += p.userData.vz;
    p.userData.vy -= 0.003;
    p.userData.life -= 0.03;
    p.material.opacity = p.userData.life;
    p.material.transparent = true;
    if (p.userData.life <= 0) p.visible = false;
  }
}

// ====== 碰撞检测 ======
function checkCollisions() {
  const ballWorld = ball.position.clone();
  const r = CONFIG.ballRadius;

  // 平台碰撞
  let onPlatform = false;
  for (const plat of platforms) {
    const pz = plat.position.z;
    const halfL = CONFIG.platformLength / 2;
    const halfW = CONFIG.platformWidth / 2;

    if (ballWorld.z > pz - halfL && ballWorld.z < pz + halfL &&
        ballWorld.x > -halfW && ballWorld.x < halfW) {
      const platTop = 0.2; // 平台顶部高度
      if (ballWorld.y - r <= platTop + 0.05 && ballVelocityY <= 0) {
        ball.position.y = platTop + r;
        ballVelocityY = 0;
        isOnGround = true;
        onPlatform = true;
      }
    }
  }

  if (!onPlatform) isOnGround = false;

  // 掉落检测
  if (ball.position.y < -10) {
    gameOver();
    return;
  }

  // 障碍物碰撞
  for (const obs of obstacles) {
    if (!obs.parent) continue;
    const worldPos = new THREE.Vector3();
    obs.getWorldPosition(worldPos);

    const dist = ballWorld.distanceTo(worldPos);
    if (dist < r + 0.4) {
      emitParticles(ballWorld, 0xff3366, 20);
      gameOver();
      return;
    }
  }

  // 星星收集
  for (const star of stars) {
    if (star.userData.collected || !star.parent) continue;
    const worldPos = new THREE.Vector3();
    star.getWorldPosition(worldPos);

    const dist = ballWorld.distanceTo(worldPos);
    if (dist < r + 0.4) {
      star.userData.collected = true;
      star.visible = false;
      emitParticles(worldPos, 0xffd700, 15);
      collectStar();
    }
  }
}

function collectStar() {
  combo++;
  const points = combo >= 5 ? 3 : combo >= 3 ? 2 : 1;
  score += points;
  document.getElementById('score').textContent = `★ ${score}`;

  if (combo >= 3) {
    const el = document.getElementById('combo');
    el.textContent = `${combo}连击! ×${points}`;
    el.style.opacity = 1;
    setTimeout(() => el.style.opacity = 0, 800);
  }
}

// ====== 输入处理 ======
const keys = {};

function onKeyDown(e) {
  keys[e.code] = true;

  if (gameState === 'menu' || gameState === 'dead') {
    if (e.code === 'Space') { e.preventDefault(); startGame(); }
    return;
  }

  if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
    moveLane(-1);
  } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
    moveLane(1);
  } else if (e.code === 'Space') {
    e.preventDefault();
    jump();
  }
}

function onKeyUp(e) { keys[e.code] = false; }

function onTap(e) {
  if (gameState === 'menu' || gameState === 'dead') {
    startGame();
    return;
  }
}

function moveLane(dir) {
  ballLane = Math.max(0, Math.min(2, ballLane + dir));
  targetX = (ballLane - 1) * CONFIG.laneWidth;
  combo = 0; // 换道重置连击
}

function jump() {
  if (isOnGround) {
    ballVelocityY = CONFIG.jumpForce;
    isOnGround = false;
  }
}

function setupMobileControls() {
  const left = document.getElementById('btn-left');
  const right = document.getElementById('btn-right');
  const jumpBtn = document.getElementById('btn-jump');

  left.addEventListener('touchstart', (e) => { e.preventDefault(); e.stopPropagation(); moveLane(-1); });
  right.addEventListener('touchstart', (e) => { e.preventDefault(); e.stopPropagation(); moveLane(1); });
  jumpBtn.addEventListener('touchstart', (e) => { e.preventDefault(); e.stopPropagation(); jump(); });
}

// ====== 游戏控制 ======
function startGame() {
  gameState = 'playing';
  score = 0;
  combo = 0;
  gameSpeed = CONFIG.baseSpeed;
  ballLane = 1;
  targetX = 0;
  ballX = 0;
  ballVelocityY = 0;
  isOnGround = true;
  nextPlatformZ = 0;

  // 清除旧平台
  for (const p of platforms) scene.remove(p);
  platforms = [];
  obstacles = [];
  stars = [];

  ball.position.set(0, CONFIG.ballRadius + 0.5, 2);

  // 重新生成
  for (let i = 0; i < 10; i++) spawnPlatform(i < 2);

  document.getElementById('score').textContent = '★ 0';
  document.getElementById('overlay').classList.add('hidden');
}

function gameOver() {
  gameState = 'dead';

  const overlay = document.getElementById('overlay');
  overlay.innerHTML = `
    <h2>GAME OVER</h2>
    <div class="stats">得分: ★ ${score}</div>
    <div class="stats">最高连击: ${combo}</div>
    <div class="hint">按 空格键 / 点击屏幕 重新开始</div>
  `;
  overlay.classList.remove('hidden');
}

// ====== 游戏循环 ======
function animate() {
  requestAnimationFrame(animate);

  if (gameState === 'playing') {
    const delta = Math.min(clock.getDelta(), 0.05);

    // 速度递增
    gameSpeed = Math.min(CONFIG.maxSpeed, gameSpeed + CONFIG.speedIncrement);
    const speedMultiplier = (gameSpeed / CONFIG.baseSpeed).toFixed(1);
    document.getElementById('speed-display').textContent = `速度: ${speedMultiplier}x`;

    // 移动平台（模拟球向前跑）
    for (const p of platforms) {
      p.position.z -= gameSpeed * 60 * delta;
    }

    // 清除远处平台
    while (platforms.length > 0 && platforms[0].position.z < CONFIG.despawnDistance) {
      const old = platforms.shift();
      // 清除关联的障碍物和星星
      obstacles = obstacles.filter(o => o.parent !== old);
      stars = stars.filter(s => s.parent !== old);
      scene.remove(old);
    }

    // 生成新平台
    const lastZ = platforms.length > 0 ? platforms[platforms.length - 1].position.z : 0;
    while (nextPlatformZ - lastZ < CONFIG.spawnDistance || platforms.length < 8) {
      spawnPlatform();
      // 防止无限循环
      if (platforms.length > 20) break;
    }

    // 球的水平移动（平滑过渡）
    ballX += (targetX - ballX) * 0.15;
    ball.position.x = ballX;

    // 重力和跳跃
    ballVelocityY += CONFIG.gravity;
    ball.position.y += ballVelocityY;

    // 球旋转
    ball.rotation.x += gameSpeed * 3;
    ball.rotation.z = (targetX - ballX) * 0.5;

    // 碰撞检测
    checkCollisions();

    // 相机跟随
    camera.position.x += (ball.position.x * 0.5 - camera.position.x) * 0.05;
    camera.position.y += (ball.position.y + 3.5 - camera.position.y) * 0.05;

    // 旋转星星
    for (const star of stars) {
      if (!star.userData.collected && star.children[0]) {
        star.children[0].rotation.y += 0.03;
        star.children[0].rotation.x += 0.02;
      }
    }

    updateParticles();
  } else {
    // 菜单/死亡状态下轻微动画
    if (ball) ball.rotation.y += 0.01;
  }

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// 启动
init();
</script>
</body>
</html>
