<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axon Browser Bridge - Settings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
      padding: 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 8px;
    }

    .header p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
    }

    .form-group .help-text {
      font-size: 12px;
      color: #888;
      margin-top: 6px;
    }

    .status {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 14px;
      display: none;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .status.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
      display: block;
    }

    .button-group {
      display: flex;
      gap: 12px;
    }

    button {
      flex: 1;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    button.primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    button.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    button.secondary {
      background: #f0f0f0;
      color: #333;
    }

    button.secondary:hover {
      background: #e0e0e0;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    .connection-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-radius: 8px;
      background: #f8f9fa;
      margin-bottom: 24px;
    }

    .connection-status .indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #dc3545;
    }

    .connection-status.connected .indicator {
      background: #28a745;
    }

    .connection-status .text {
      font-size: 14px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🌉 Axon Browser Bridge</h1>
      <p>Configure relay connection settings</p>
    </div>

    <div id="connection-status" class="connection-status">
      <div class="indicator"></div>
      <div class="text">Checking connection...</div>
    </div>

    <div id="status" class="status"></div>

    <form id="settings-form">
      <div class="form-group">
        <label for="relayPort">Relay Server Port</label>
        <input type="number" id="relayPort" name="relayPort" placeholder="18792" min="1" max="65535" required>
        <div class="help-text">Default: 18792 (must match the relay server port)</div>
      </div>

      <div class="form-group">
        <label for="gatewayToken">Authentication Token</label>
        <input type="text" id="gatewayToken" name="gatewayToken" placeholder="Enter auth token" required>
        <div class="help-text">Get this from ~/.axon/browser/relay-token or your relay server</div>
      </div>

      <div class="button-group">
        <button type="submit" class="primary">Save Settings</button>
        <button type="button" id="test-connection" class="secondary">Test Connection</button>
      </div>
    </form>
  </div>

  <script src="options.js" type="module"></script>
</body>
</html>
