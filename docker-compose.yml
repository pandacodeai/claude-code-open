services:
  claude:
    image: wbj66/claude-code-open:latest
    # 本地构建时取消注释下面这行并注释上面 image 行
    # build: .
    stdin_open: true
    tty: true
    restart: unless-stopped
    # Chromium 需要足够的共享内存
    shm_size: '2gb'
    ports:
      - "3456:3456"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_WEB_HOST=0.0.0.0
      - CLAUDE_WEB_PORT=3456
      - CLAUDE_MODEL=${CLAUDE_MODEL:-sonnet}
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
    env_file:
      - path: .env
        required: false
    volumes:
      # 持久化会话、配置、笔记本
      - ~/.claude:/root/.claude
      # 映射当前目录为工作区，让 Claude 能读写你的文件
      - .:/workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3456/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
